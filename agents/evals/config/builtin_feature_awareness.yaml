tests:
  - name: worktrees_knows_builtin_flag
    skill_path: agents/skills/session/worktrees.md
    prompt: "I need to run a quick isolated task. Should I always create a manual worktree, or is there a simpler built-in option?"
    model: haiku
    assertions:
      output_contains_any:
        - "built-in"
        - "--worktree"
        - "EnterWorktree"
        - "builtin"
        - "flag"
        - "simple"

  - name: deep_work_knows_postcompact
    skill_path: agents/skills/session/deep-work.md
    prompt: "What happens to deep-work context when a compaction occurs? Is there any automatic recovery?"
    model: haiku
    assertions:
      output_contains_any:
        - "PostCompact"
        - "hook"
        - "recovery"
        - "automatic"
        - "compaction"

  - name: deep_work_distinguishes_auto_memory
    skill_path: agents/skills/session/deep-work.md
    prompt: "When should I use auto-memory versus deep-work? What's the difference?"
    model: haiku
    assertions:
      output_contains_any:
        - "persistent"
        - "ephemeral"
        - "durable"
        - "task"
        - "complement"
        - "different"

  - name: claude_skill_knows_builtin_agents
    skill_path: agents/skills/session/SKILL.md
    extra_skill_paths:
      - agents/skills/session/claude.md
    prompt: "I need to spawn a parallel coding session. Should I always use spawn-claude.sh, or is there a simpler alternative?"
    model: haiku
    assertions:
      output_contains_any:
        - "Agent tool"
        - "built-in"
        - "builtin"
        - "subagent"
        - "within the same session"
        - "simple"
