tests:
  - name: dotfiles_expert_knows_structure
    skill_path: agents/skills/nix/SKILL.md
    extra_skill_paths:
      - agents/skills/nix/repo.md
    prompt: "Where should I put a new home-manager module?"
    model: haiku
    max_turns: 3
    assertions:
      output_contains:
        - "home/modules"

  - name: nix_expert_explains_concepts
    skill_path: agents/skills/nix/SKILL.md
    extra_skill_paths:
      - agents/skills/nix/expert.md
    prompt: "What is a Nix overlay?"
    model: haiku
    max_turns: 2
    assertions:
      output_contains_any:
        - "overlay"
        - "package"
        - "override"
