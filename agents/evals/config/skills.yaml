tests:
  - name: commit_skill_knows_conventions
    skill_path: agents/skills/git/SKILL.md
    extra_skill_paths:
      - agents/skills/git/commit.md
    prompt: "What are the key rules you follow when creating a commit?"
    model: haiku
    assertions:
      output_contains_any:
        - "conventional"
        - "specific"
        - "diff"
        - "imperative"
