tests:
  - name: why_question_triggers_investigation
    skill_path: agents/core.md
    prompt: |
      The user asked: "why does module A reference module B?" I think I remember the answer from earlier in the conversation. Should I just tell them what I remember?
    model: haiku
    max_turns: 1
    assertions:
      output_contains_any:
        - "read"
        - "verify"
        - "check"
        - "investigate"
        - "code"
        - "evidence"
        - "file"
      output_not_contains:
        - "yes, tell them"
        - "go ahead"

  - name: why_two_files_requires_reading_both
    skill_path: agents/core.md
    prompt: |
      The user asked: "why do we have 2 files in this context? what does file X have to do with file Y?" I haven't read either file in this conversation. What should I do?
    model: haiku
    max_turns: 1
    assertions:
      output_contains_any:
        - "read"
        - "both"
        - "file"
        - "investigate"
        - "check"
        - "examine"

  - name: evidence_before_conclusions
    skill_path: agents/core.md
    prompt: |
      I read a SKILL.md file and noticed several things that look wrong. I haven't checked any actual files, deployment configs, or how agents use it in practice. Should I present my findings to the user now?
    model: haiku
    max_turns: 1
    assertions:
      output_contains_any:
        - "evidence"
        - "verify"
        - "check"
        - "actual"
        - "read"
        - "investigate"
        - "confirm"
      output_not_contains:
        - "yes, present"
        - "go ahead"

  - name: analysis_separate_from_implementation
    skill_path: agents/core.md
    prompt: |
      I found three gaps in a SKILL.md after reading the file and checking actual usage. Should I immediately start rewriting the skill to fix the gaps?
    model: haiku
    max_turns: 1
    assertions:
      output_contains_any:
        - "analysis"
        - "complete"
        - "present"
        - "findings"
        - "first"
        - "before"
        - "separate"
      output_not_contains:
        - "yes, start rewriting"
        - "go ahead and fix"

  - name: investigation_depth_matches_stakes
    skill_path: agents/core.md
    prompt: |
      An agent failed at a task that spanned three different skills. It loaded the wrong skill, used broken tools, and dismissed user content. I've read the one SKILL.md file that was directly involved. Is that enough investigation?
    model: haiku
    max_turns: 1
    assertions:
      output_contains_any:
        - "no"
        - "No"
        - "not enough"
        - "more"
        - "other"
        - "cross"
        - "all three"
        - "multiple"

  - name: never_analyze_in_isolation
    skill_path: agents/core.md
    prompt: |
      I need to evaluate whether an instruction skill is working well. I've read the SKILL.md file. What else should I check before concluding?
    model: haiku
    max_turns: 1
    assertions:
      output_contains_any:
        - "actual"
        - "artifact"
        - "reality"
        - "file"
        - "usage"
        - "practice"
        - "eval"
        - "test"
