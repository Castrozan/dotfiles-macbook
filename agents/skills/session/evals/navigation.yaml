tests:
  - name: session_routes_to_deep_work
    agent: session
    prompt: "I need to set up persistent context management for a large multi-session task. Which file in this skill should I read?"
    model: haiku
    assertions:
      output_contains_any:
        - "deep-work.md"
        - "deep-work"

  - name: session_routes_to_worktrees
    agent: session
    prompt: "I need to work on two branches simultaneously using git worktrees. Which file in this skill has worktree instructions?"
    model: haiku
    assertions:
      output_contains_any:
        - "worktrees.md"
        - "worktrees"

  - name: session_routes_to_tmux
    agent: session
    prompt: "I need to run a long process in a background tmux session. Which file in this skill covers tmux control?"
    model: haiku
    assertions:
      output_contains_any:
        - "tmux.md"
        - "tmux"

  - name: session_routes_to_restart
    agent: session
    prompt: "My session is getting stale and I need to restart it cleanly. Which file in this skill covers session restart?"
    model: haiku
    assertions:
      output_contains_any:
        - "restart.md"
        - "restart"

  - name: session_routes_to_exit
    agent: session
    prompt: "I am done with my work and want to properly exit this session. Which file in this skill covers session exit?"
    model: haiku
    assertions:
      output_contains_any:
        - "exit.md"
        - "exit"
