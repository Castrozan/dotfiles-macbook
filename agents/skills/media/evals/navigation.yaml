tests:
  - name: media_routes_to_media_control
    agent: media
    prompt: "I want to pause the currently playing music track. Which file in this skill should I read?"
    model: haiku
    assertions:
      output_contains_any:
        - "media-control.md"
        - "media-control"

  - name: media_routes_to_youtube
    agent: media
    prompt: "I need to search for a video on YouTube and add it to a playlist. Which file in this skill covers YouTube operations?"
    model: haiku
    assertions:
      output_contains_any:
        - "youtube.md"
        - "youtube"
