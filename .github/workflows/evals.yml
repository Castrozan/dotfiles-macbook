name: evals
on:
  push:
    branches: [main]
    paths:
      - "agents/**"
      - "CLAUDE.md"

jobs:
  baseline-regression-check:
    runs-on: ubuntu-latest
    timeout-minutes: 2
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: false

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pyyaml
        run: pip install pyyaml

      - name: Check eval baseline for regression
        run: python3 agents/evals/run-evals.py --check-baseline
